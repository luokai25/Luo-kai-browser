<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Infinite Vault - Compression + Encryption</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; padding: 20px; text-align: center; }
        h1 { background: linear-gradient(90deg, #00d4ff, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 2rem; }
        .subtitle { color: #666; margin-bottom: 20px; }
        input { padding: 12px; font-size: 16px; background: #111; border: 1px solid #333; color: #fff; border-radius: 6px; width: 250px; margin: 10px; }
        input:focus { border-color: #00d4ff; outline: none; }
        button { padding: 12px 24px; font-size: 15px; background: #00d4ff; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(0,212,255,0.3); }
        .btn { padding: 10px 16px; background: #222; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; }
        .btn:hover { background: #333; }
        .btn-danger { background: #ff4444; }
        .btn-danger:hover { background: #ff6666; }
        .btn-success { background: #00ff88; color: #000; }
        .btn-zip { background: #a855f7; color: #fff; }
        #app { display: none; text-align: left; max-width: 750px; margin: 0 auto; }
        
        .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 20px 0; }
        .stat { background: #111; padding: 15px; border-radius: 8px; text-align: center; border: 1px solid #222; }
        .stat .val { font-size: 20px; color: #00d4ff; font-weight: bold; }
        .stat .lbl { font-size: 10px; color: #666; text-transform: uppercase; margin-top: 5px; }
        .stat.highlight { border-color: #00ff88; }
        .stat.highlight .val { color: #00ff88; }
        
        .toolbar { display: flex; gap: 8px; margin: 15px 0; flex-wrap: wrap; }
        
        .upload-zone { border: 2px dashed #333; padding: 30px; border-radius: 10px; margin: 15px 0; cursor: pointer; transition: all 0.3s; }
        .upload-zone:hover { border-color: #00d4ff; background: rgba(0,212,255,0.05); }
        .upload-zone .icon { font-size: 35px; }
        .upload-zone .text { margin-top: 8px; }
        .upload-zone .hint { font-size: 12px; color: #666; margin-top: 5px; }
        
        .progress { background: #111; padding: 15px; margin: 15px 0; border-radius: 8px; display: none; }
        .progress.show { display: block; }
        .progress-bar { height: 10px; background: #222; border-radius: 5px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #00d4ff, #a855f7); width: 0%; }
        .progress-text { margin-top: 8px; color: #888; font-size: 13px; }
        .progress-detail { font-size: 12px; color: #666; margin-top: 4px; }
        
        .file-list { max-height: 400px; overflow-y: auto; }
        .file-item { background: #111; padding: 12px; margin: 6px 0; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #222; }
        .file-item:hover { border-color: #00d4ff; }
        .file-info { text-align: left; flex: 1; min-width: 0; }
        .file-name { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .file-sizes { font-size: 11px; color: #888; margin-top: 3px; }
        .file-sizes .original { color: #ff6666; }
        .file-sizes .compressed { color: #00ff88; }
        .file-sizes .saved { color: #00d4ff; }
        .file-folder { color: #a855f7; font-size: 11px; }
        .file-actions { display: flex; gap: 5px; flex-shrink: 0; }
        .file-actions .btn { padding: 8px 12px; }
        
        .empty { padding: 40px; color: #444; text-align: center; }
        
        .info { color: #666; font-size: 13px; margin-top: 30px; text-align: center; }
        
        #lock { max-width: 400px; margin: 50px auto; }
        
        .folder-badge { background: #a855f7; padding: 2px 8px; border-radius: 4px; font-size: 10px; margin-left: 8px; }
    </style>
</head>
<body>
    <h1>∞ Infinite Vault</h1>
    <p class="subtitle">Compression + Encryption = Maximum Storage</p>
    
    <div id="lock">
        <input type="password" id="pass" placeholder="Master Password">
        <br>
        <button onclick="unlock()">🔓 Unlock / Create Vault</button>
        <p class="info">Files: Compress (GZIP) → Encrypt (AES-256) → Store</p>
    </div>
    
    <div id="app">
        <!-- Stats Dashboard -->
        <div class="stats">
            <div class="stat">
                <div class="val" id="fileCount">0</div>
                <div class="lbl">Files</div>
            </div>
            <div class="stat">
                <div class="val" id="origSize">0 B</div>
                <div class="lbl">Original</div>
            </div>
            <div class="stat">
                <div class="val" id="compSize">0 B</div>
                <div class="lbl">Compressed</div>
            </div>
            <div class="stat highlight">
                <div class="val" id="savedPct">0%</div>
                <div class="lbl">Saved</div>
            </div>
        </div>
        
        <!-- Toolbar -->
        <div class="toolbar">
            <button class="btn" onclick="lockVault()">🔒 Lock</button>
            <button class="btn" onclick="document.getElementById('fi').click()">📤 Upload Files</button>
            <button class="btn btn-zip" onclick="document.getElementById('fd').click()">📂 Upload Folder (ZIP)</button>
            <button class="btn btn-success" onclick="downloadAllAsZip()">⬇️ Download All as ZIP</button>
            <button class="btn btn-danger" onclick="clearAll()">🗑️ Clear All</button>
            <input type="file" id="fi" multiple hidden>
            <input type="file" id="fd" webkitdirectory multiple hidden>
        </div>
        
        <!-- Upload Zone -->
        <div class="upload-zone" onclick="document.getElementById('fi').click()">
            <div class="icon">📦</div>
            <div class="text">Click or drag files here</div>
            <div class="hint">Files compressed → encrypted → stored</div>
        </div>
        
        <!-- Progress -->
        <div class="progress" id="progress">
            <div class="progress-bar"><div class="progress-fill" id="progFill"></div></div>
            <div class="progress-text" id="progText">Processing...</div>
            <div class="progress-detail" id="progDetail"></div>
        </div>
        
        <!-- File List -->
        <div class="file-list" id="fileList"></div>
    </div>

    <!-- JSZip Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <script>
        // ============ CONFIG ============
        const DB_NAME = 'VaultDB_v4';
        let db = null;
        let files = []; // {id, name, path, type, originalSize, compressedSize, encryptedData}
        let pwd = '';
        
        // ============ DB ============
        function openDB() {
            return new Promise((resolve, reject) => {
                const r = indexedDB.open(DB_NAME, 1);
                r.onerror = () => reject(r.error);
                r.onsuccess = () => { db = r.result; resolve(db); };
                r.onupgradeneeded = (e) => {
                    const d = e.target.result;
                    if (!d.objectStoreNames.contains('files')) d.createObjectStore('files', { keyPath: 'id' });
                };
            });
        }
        
        async function init() {
            try { await openDB(); console.log('DB ready'); } catch(e) { console.log(e); }
        }
        init();
        
        // ============ COMPRESSION (GZIP) ============
        async function compress(data) {
            const cs = new CompressionStream('gzip');
            const writer = cs.writable.getWriter();
            writer.write(data);
            writer.close();
            const reader = cs.readable.getReader();
            let chunks = [];
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                chunks.push(value);
            }
            return concat(chunks);
        }
        
        async function decompress(data) {
            const cs = new DecompressionStream('gzip');
            const writer = cs.writable.getWriter();
            writer.write(data);
            writer.close();
            const reader = cs.readable.getReader();
            let chunks = [];
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                chunks.push(value);
            }
            return concat(chunks);
        }
        
        function concat(arrays) {
            let total = arrays.reduce((s, a) => s + a.length, 0);
            let result = new Uint8Array(total);
            let offset = 0;
            for (let arr of arrays) { result.set(arr, offset); offset += arr.length; }
            return result;
        }
        
        // ============ ENCRYPTION (AES-256-GCM) ============
        async function encrypt(data, password) {
            const encoder = new TextEncoder();
            const salt = encoder.encode('vault_v4_2024');
            
            const km = await crypto.subtle.importKey('raw', encoder.encode(password), 'PBKDF2', false, ['deriveKey']);
            const key = await crypto.subtle.deriveKey(
                { name: 'PBKDF2', salt: salt, iterations: 50000, hash: 'SHA-256' },
                km, { name: 'AES-GCM', length: 256 }, false, ['encrypt']
            );
            
            const iv = crypto.getRandomValues(new Uint8Array(12));
            const enc = await crypto.subtle.encrypt({ name: 'AES-GCM', iv: iv }, key, data);
            
            const result = new Uint8Array(iv.length + enc.byteLength);
            result.set(iv, 0);
            result.set(new Uint8Array(enc), iv.length);
            return result;
        }
        
        async function decrypt(data, password) {
            try {
                const encoder = new TextEncoder();
                const salt = encoder.encode('vault_v4_2024');
                
                const iv = data.slice(0, 12);
                const encrypted = data.slice(12);
                
                const km = await crypto.subtle.importKey('raw', encoder.encode(password), 'PBKDF2', false, ['deriveKey']);
                const key = await crypto.subtle.deriveKey(
                    { name: 'PBKDF2', salt: salt, iterations: 50000, hash: 'SHA-256' },
                    km, { name: 'AES-GCM', length: 256 }, false, ['decrypt']
                );
                
                const dec = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: iv }, key, encrypted);
                return dec;
            } catch(e) { console.log(e); return null; }
        }
        
        // ============ VAULT OPERATIONS ============
        
        async function unlock() {
            pwd = document.getElementById('pass').value;
            if (!pwd) return;
            
            try {
                if (!db) await openDB();
                
                const tx = db.transaction('files', 'readonly');
                const req = tx.objectStore('files').getAll();
                
                req.onsuccess = async () => {
                    const stored = req.result || [];
                    
                    files = [];
                    for (const sf of stored) {
                        try {
                            const decrypted = await decrypt(new Uint8Array(sf.encryptedData), pwd);
                            if (!decrypted) continue;
                            
                            const decompressed = await decompress(decrypted);
                            
                            files.push({
                                id: sf.id,
                                name: sf.name,
                                path: sf.path || sf.name,
                                type: sf.type,
                                originalSize: sf.originalSize,
                                compressedSize: sf.compressedSize,
                                data: decompressed
                            });
                        } catch(e) { console.log('Error loading:', e); }
                    }
                    
                    document.getElementById('lock').style.display = 'none';
                    document.getElementById('app').style.display = 'block';
                    render();
                };
            } catch(e) { console.log(e); }
        }
        
        function lockVault() {
            files = [];
            pwd = '';
            document.getElementById('app').style.display = 'none';
            document.getElementById('lock').style.display = 'block';
            document.getElementById('pass').value = '';
        }
        
        async function clearAll() {
            if (!confirm('🗑️ Delete ALL files? This cannot be undone!')) return;
            
            const tx = db.transaction('files', 'readwrite');
            tx.objectStore('files').clear();
            
            files = [];
            render();
        }
        
        async function deleteFile(id) {
            if (!confirm('Delete this file?')) return;
            
            const tx = db.transaction('files', 'readwrite');
            tx.objectStore('files').delete(id);
            
            files = files.filter(f => f.id !== id);
            render();
        }
        
        // ============ UPLOAD (Handles Large Files) ============
        
        async function upload(fileList) {
            if (!fileList || fileList.length === 0) return;
            
            const prog = document.getElementById('progress');
            const progFill = document.getElementById('progFill');
            const progText = document.getElementById('progText');
            const progDetail = document.getElementById('progDetail');
            
            prog.classList.add('show');
            const total = fileList.length;
            
            // Convert FileList to Array for easier handling
            const fileArray = Array.from(fileList);
            
            for (let i = 0; i < fileArray.length; i++) {
                const file = fileArray[i];
                
                progFill.style.width = ((i / total) * 100) + '%';
                progText.innerText = `Processing ${i + 1}/${total}`;
                progDetail.innerText = file.name;
                
                try {
                    // Read file - handle large files with streaming if needed
                    progDetail.innerText = `Reading: ${file.name}`;
                    const buffer = await readFileAsArrayBuffer(file);
                    const originalData = new Uint8Array(buffer);
                    
                    // Compress
                    progDetail.innerText = `Compressing: ${file.name}`;
                    const compressedData = await compress(originalData);
                    
                    // Encrypt
                    progDetail.innerText = `Encrypting: ${file.name}`;
                    const encryptedData = await encrypt(compressedData, pwd);
                    
                    // Get folder path if exists
                    const path = file.webkitRelativePath || file.name;
                    
                    const fileRec = {
                        id: Date.now() + Math.random(),
                        name: file.name,
                        path: path,
                        type: file.type || 'application/octet-stream',
                        originalSize: originalData.length,
                        compressedSize: compressedData.length,
                        encryptedData: Array.from(encryptedData)
                    };
                    
                    // Save to DB
                    const tx = db.transaction('files', 'readwrite');
                    tx.objectStore('files').add(fileRec);
                    
                    // Add to memory (keep original for download)
                    files.push({
                        id: fileRec.id,
                        name: fileRec.name,
                        path: fileRec.path,
                        type: fileRec.type,
                        originalSize: fileRec.originalSize,
                        compressedSize: fileRec.compressedSize,
                        data: originalData
                    });
                    
                } catch(e) {
                    console.log('Error:', e);
                }
            }
            
            progFill.style.width = '100%';
            progText.innerText = `✅ Complete! ${total} files uploaded.`;
            
            setTimeout(() => prog.classList.remove('show'), 2000);
            
            document.getElementById('fi').value = '';
            document.getElementById('fd').value = '';
            render();
        }
        
        // Helper to read large files
        function readFileAsArrayBuffer(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = () => reject(reader.error);
                reader.readAsArrayBuffer(file);
            });
        }
        
        // ============ DOWNLOAD ============
        
        function downloadFile(id) {
            const f = files.find(x => x.id === id);
            if (!f || !f.data) return;
            
            const blob = new Blob([f.data], { type: f.type });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = f.name;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
        
        // Download ALL as ZIP (preserves folder structure)
        async function downloadAllAsZip() {
            if (files.length === 0) {
                alert('No files to download!');
                return;
            }
            
            const prog = document.getElementById('progress');
            const progFill = document.getElementById('progFill');
            const progText = document.getElementById('progText');
            
            prog.classList.add('show');
            progText.innerText = 'Creating ZIP archive...';
            
            try {
                const zip = new JSZip();
                
                // Add each file to ZIP (preserves folder structure)
                for (let i = 0; i < files.length; i++) {
                    const f = files[i];
                    progFill.style.width = ((i / files.length) * 100) + '%';
                    progText.innerText = `Adding to ZIP: ${f.name}`;
                    
                    // Use path for folder structure, fallback to name
                    zip.file(f.path || f.name, f.data);
                }
                
                progText.innerText = 'Generating ZIP file...';
                
                // Generate ZIP blob
                const zipBlob = await zip.generateAsync({
                    type: 'blob',
                    compression: 'DEFLATE',
                    compressionOptions: { level: 6 }
                });
                
                // Download
                const url = URL.createObjectURL(zipBlob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'vault-backup-' + Date.now() + '.zip';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                
                progFill.style.width = '100%';
                progText.innerText = '✅ ZIP downloaded!';
                
            } catch(e) {
                console.log(e);
                progText.innerText = 'Error creating ZIP';
            }
            
            setTimeout(() => prog.classList.remove('show'), 2000);
        }
        
        // ============ RENDER ============
        
        function render() {
            document.getElementById('fileCount').innerText = files.length;
            
            const orig = files.reduce((s, f) => s + (f.originalSize || 0), 0);
            const comp = files.reduce((s, f) => s + (f.compressedSize || 0), 0);
            
            document.getElementById('origSize').innerText = fmtSize(orig);
            document.getElementById('compSize').innerText = fmtSize(comp);
            
            const saved = orig > 0 ? ((orig - comp) / orig * 100).toFixed(1) : 0;
            document.getElementById('savedPct').innerText = saved + '%';
            
            const list = document.getElementById('fileList');
            
            if (files.length === 0) {
                list.innerHTML = '<div class="empty">📂 No files yet.<br>Click Upload to add files.</div>';
                return;
            }
            
            const sorted = [...files].reverse();
            
            list.innerHTML = sorted.map(f => {
                const savedPct = f.originalSize > 0 ? ((f.originalSize - f.compressedSize) / f.originalSize * 100).toFixed(0) : 0;
                const isFolder = f.path && f.path !== f.name;
                
                return '<div class="file-item">' +
                    '<div class="file-info">' +
                        '<div class="file-name" title="' + f.path + '">' + 
                            (isFolder ? '<span class="folder-badge">📂</span> ' : '') + 
                            f.name + 
                        '</div>' +
                        '<div class="file-sizes">' +
                            '<span class="original">' + fmtSize(f.originalSize) + '</span> → ' +
                            '<span class="compressed">' + fmtSize(f.compressedSize) + '</span> ' +
                            '<span class="saved">(-' + savedPct + '%)</span>' +
                        '</div>' +
                    '</div>' +
                    '<div class="file-actions">' +
                        '<button class="btn btn-success" onclick="downloadFile(' + f.id + ')">⬇️</button>' +
                        '<button class="btn btn-danger" onclick="deleteFile(' + f.id + ')">🗑️</button>' +
                    '</div>' +
                '</div>';
            }).join('');
        }
        
        function fmtSize(b) {
            if (!b) return '0 B';
            const s = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(b) / Math.LN1e3);
            return (b / Math.pow(1e3, i)).toFixed(1) + ' ' + s[i];
        }
        
        // ============ EVENTS ============
        document.getElementById('fi').onchange = (e) => upload(e.target.files);
        document.getElementById('fd').onchange = (e) => upload(e.target.files);
        document.getElementById('pass').onkeypress = (e) => { if (e.key === 'Enter') unlock(); };
        
        const zone = document.querySelector('.upload-zone');
        zone.ondragover = (e) => { e.preventDefault(); zone.style.borderColor = '#00d4ff'; };
        zone.ondragleave = () => { zone.style.borderColor = '#333'; };
        zone.ondrop = (e) => { e.preventDefault(); zone.style.borderColor = '#333'; upload(e.dataTransfer.files); };
    </script>
</body>
</html>
