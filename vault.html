<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Infinite Vault</title>
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; padding: 20px; text-align: center; }
        h1 { background: linear-gradient(90deg, #00d4ff, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        input { padding: 12px; font-size: 16px; background: #111; border: 1px solid #333; color: #fff; border-radius: 6px; width: 250px; margin: 10px; }
        button { padding: 12px 24px; font-size: 16px; background: #00d4ff; border: none; border-radius: 6px; cursor: pointer; }
        #app { display: none; text-align: left; max-width: 600px; margin: 20px auto; }
        .stats { display: flex; gap: 10px; margin: 20px 0; }
        .stat { background: #111; padding: 15px; border-radius: 8px; flex: 1; text-align: center; }
        .stat .val { font-size: 24px; color: #00d4ff; }
        .stat .lbl { font-size: 12px; color: #666; }
        .btn { padding: 10px 20px; background: #222; color: #fff; border: none; border-radius: 6px; cursor: pointer; margin: 5px; }
        .btn-danger { background: #ff4444; }
        .zone { border: 2px dashed #333; padding: 40px; border-radius: 10px; margin: 20px 0; cursor: pointer; }
        .zone:hover { border-color: #00d4ff; }
        .file { background: #111; padding: 10px; margin: 5px 0; border-radius: 6px; display: flex; justify-content: space-between; }
        .error { color: red; margin: 10px; }
        .info { color: #666; font-size: 14px; margin-top: 30px; }
    </style>
</head>
<body>
    <h1>∞ Infinite Vault</h1>
    
    <div id="lock">
        <input type="password" id="pass" placeholder="Password">
        <br>
        <button onclick="unlock()">Unlock / Create</button>
        <p class="error" id="err"></p>
        <p class="info">Type any password to create new vault</p>
    </div>
    
    <div id="app">
        <div class="stats">
            <div class="stat"><div class="val" id="cnt">0</div><div class="lbl">Files</div></div>
            <div class="stat"><div class="val" id="size">0 B</div><div class="lbl">Size</div></div>
        </div>
        
        <button class="btn" onclick="lock()">🔒 Lock</button>
        <button class="btn" onclick="document.getElementById('fi').click()">📤 Upload</button>
        <button class="btn" onclick="document.getElementById('fd').click()">📂 Folder</button>
        <input type="file" id="fi" multiple hidden>
        <input type="file" id="fd" webkitdirectory multiple hidden>
        
        <div class="zone" onclick="document.getElementById('fi').click()">
            Click to upload files (unlimited!)
        </div>
        
        <div id="list"></div>
    </div>

    <script>
        let files = [];
        let pwd = '';
        let db = null;
        
        const DB_NAME = 'VaultDB';
        
        function openDB() {
            return new Promise((resolve, reject) => {
                const r = indexedDB.open(DB_NAME, 1);
                r.onerror = () => reject(r.error);
                r.onsuccess = () => { db = r.result; resolve(db); };
                r.onupgradeneeded = (e) => {
                    const d = e.target.result;
                    if (!d.objectStoreNames.contains('files')) d.createObjectStore('files', { keyPath: 'id' });
                };
            });
        }
        
        async function init() {
            try { await openDB(); console.log('DB ready'); } catch(e) { console.log(e); }
        }
        init();
        
        async function unlock() {
            pwd = document.getElementById('pass').value;
            if (!pwd) { document.getElementById('err').innerText = 'Enter password'; return; }
            
            try {
                if (!db) await openDB();
                
                // Load files
                const tx = db.transaction('files', 'readonly');
                const req = tx.objectStore('files').getAll();
                req.onsuccess = () => {
                    files = req.result || [];
                    document.getElementById('lock').style.display = 'none';
                    document.getElementById('app').style.display = 'block';
                    render();
                };
            } catch(e) {
                document.getElementById('err').innerText = 'Error: ' + e.message;
            }
        }
        
        function lock() {
            files = [];
            pwd = '';
            document.getElementById('app').style.display = 'none';
            document.getElementById('lock').style.display = 'block';
            document.getElementById('pass').value = '';
        }
        
        async function upload(list) {
            if (!list || !list.length) return;
            
            for (let i = 0; i < list.length; i++) {
                const file = list[i];
                
                await new Promise(resolve => {
                    const reader = new FileReader();
                    reader.onload = async (e) => {
                        const data = e.target.result;
                        const f = {
                            id: Date.now() + Math.random(),
                            name: file.name,
                            type: file.type,
                            size: file.size,
                            data: btoa(String.fromCharCode(...new Uint8Array(data)))
                        };
                        files.push(f);
                        
                        // Save to DB
                        const tx = db.transaction('files', 'readwrite');
                        tx.objectStore('files').add(f);
                        
                        resolve();
                    };
                    reader.readAsArrayBuffer(file);
                });
            }
            render();
        }
        
        function render() {
            document.getElementById('cnt').innerText = files.length;
            const total = files.reduce((s, f) => s + (f.size || 0), 0);
            document.getElementById('size').innerText = fmtSize(total);
            
            document.getElementById('list').innerHTML = files.slice().reverse().map(f => 
                '<div class="file"><span>' + f.name + ' (' + fmtSize(f.size) + ')</span><button class="btn" onclick="down(' + f.id + ')">⬇</button></div>'
            ).join('') || '<p style="color:#666;text-align:center">No files</p>';
        }
        
        function down(id) {
            const f = files.find(x => x.id === id);
            if (!f) return;
            const bytes = Uint8Array.from(atob(f.data), c => c.charCodeAt(0));
            const blob = new Blob([bytes], { type: f.type });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = f.name;
            a.click();
        }
        
        function fmtSize(b) {
            if (!b) return '0 B';
            const s = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(b) / 1e3);
            return (b / Math.pow(1e3, i)).toFixed(1) + ' ' + s[i];
        }
        
        document.getElementById('fi').onchange = (e) => upload(e.target.files);
        document.getElementById('fd').onchange = (e) => upload(e.target.files);
        
        document.getElementById('pass').onkeypress = (e) => { if (e.key === 'Enter') unlock(); };
    </script>
</body>
</html>
