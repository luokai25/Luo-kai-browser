<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Luo Store</title>
    <style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Segoe UI',system-ui;background:#0f172a;color:#f8fafc;min-height:100vh}.header{background:linear-gradient(135deg,#6366f1,#ec4899);padding:20px 30px}.logo{font-size:24px;font-weight:700}.container{max-width:1100px;margin:0 auto;padding:30px}.search{background:#1e293b;border:2px solid #334155;border-radius:25px;padding:15px 25px;color:#f8fafc;font-size:16px;width:100%;outline:none;margin-bottom:30px}.categories{display:flex;gap:15px;margin-bottom:30px;overflow-x:auto}.cat{background:#1e293b;padding:10px 20px;border-radius:20px;cursor:pointer;white-space:nowrap}.cat:hover,.cat.active{background:#6366f1}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:20px}.card{background:#1e293b;border-radius:15px;overflow:hidden;cursor:pointer;transition:all 0.3s}.card:hover{transform:translateY(-5px)}.card-img{height:120px;background:linear-gradient(135deg,#334155,#6366f1);display:flex;align-items:center;justify-content:center;font-size:48px}.card-body{padding:20px}.card-title{font-weight:600;margin-bottom:5px}.card-dev{color:#94a3b8;font-size:13px;margin-bottom:10px}.card-footer{display:flex;justify-content:space-between;align-items:center}.price{font-size:18px;font-weight:700c55e}.;color:#22rating{color:#f59e0b}</style>
</head>
<body>
<div class="header"><div class="logo">🛒 Luo Store</div></div>
<div class="container">
<input type="text" class="search" placeholder="Search apps, extensions, themes...">
<div class="categories"><div class="cat active">All</div><div class="cat">Apps</div><div class="cat">Themes</div><div class="cat">Extensions</div><div class="cat">AI Tools</div></div>
<div class="grid">
<div class="card"><div class="card-img">🎨</div><div class="card-body"><div class="card-title">Luo Dark Theme</div><div class="card-dev">by Luo Team</div><div class="card-footer"><span class="price">Free</span><span class="rating">⭐ 4.9</span></div></div></div>
<div class="card"><div class="card-img">📊</div><div class="card-body"><div class="card-title">Luo Analytics</div><div class="card-dev">by DevTools</div><div class="card-footer"><span class="price">$4.99</span><span class="rating">⭐ 4.7</span></div></div></div>
<div class="card"><div class="card-img">🔒</div><div class="card-body"><div class="card-title">Luo Shield</div><div class="card-dev">by SecurityLab</div><div class="card-footer"><span class="price">$2.99</span><span class="rating">⭐ 4.8</span></div></div></div>
<div class="card"><div class="card-img">🤖</div><div class="card-body"><div class="card-title">AI Assistant Pro</div><div class="card-dev">by Luo AI</div><div class="card-footer"><span class="price">$9.99</span><span class="rating">⭐ 5.0</span></div></div></div>
<div class="card"><div class="card-img">📓</div><div class="card-body"><div class="card-title">Luo Notes</div><div class="card-dev">by ProductivityHub</div><div class="card-footer"><span class="price">Free</span><span class="rating">⭐ 4.5</span></div></div></div>
<div class="card"><div class="card-img">🌐</div><div class="card-body"><div class="card-title">Luo Translate</div><div class="card-dev">by LangTools</div><div class="card-footer"><span class="price">$1.99</span><span class="rating">⭐ 4.6</span></div></div></div>
</div>
</div>
</body>
</html>
