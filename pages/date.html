<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Luo Date</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui; background: linear-gradient(135deg, #ec4899, #f43f5e); min-height: 100vh; }
        .header { background: rgba(0,0,0,0.2); padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 28px; font-weight: 700; }
        .nav { display: flex; gap: 20px; }
        .nav-item { cursor: pointer; font-size: 24px; opacity: 0.7; }
        .nav-item.active { opacity: 1; }
        .cards { display: flex; justify-content: center; gap: 30px; padding: 40px; flex-wrap: wrap; }
        .card { width: 320px; height: 450px; background: white; border-radius: 20px; overflow: hidden; cursor: pointer; transition: all 0.3s; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .card:hover { transform: translateY(-10px) rotate(2deg); }
        .card-img { height: 65%; background: linear-gradient(135deg, #f472b6, #f43f5e); display: flex; align-items: center; justify-content: center; font-size: 80px; }
        .card-body { padding: 20px; color: #1f2937; }
        .card-name { font-size: 24px; font-weight: 700; }
        .card-age { font-size: 18px; color: #6b7280; }
        .card-info { margin: 10px 0; color: #4b5563; }
        .card-actions { display: flex; justify-content: center; gap: 20px; padding: 30px; }
        .action-btn { width: 70px; height: 70px; border-radius: 50%; border: none; font-size: 30px; cursor: pointer; transition: all 0.2s; }
        .action-btn:hover { transform: scale(1.1); }
        .action-btn.dislike { background: #f43f5e; }
        .action-btn.like { background: #22c55e; }
        .action-btn.super { background: #3b82f6; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">💕 Luo Date</div>
        <div class="nav">
            <div class="nav-item active">🔥</div>
            <div class="nav-item">💬</div>
            <div class="nav-item">👤</div>
        </div>
    </div>
    <div class="cards">
        <div class="card">
            <div class="card-img">👩</div>
            <div class="card-body">
                <div class="card-name">Sarah, 26</div>
                <div class="card-info">📍 New York • 🎨 Designer</div>
                <div class="card-info">Love traveling and good food!</div>
            </div>
        </div>
        <div class="card">
            <div class="card-img">👨</div>
            <div class="card-body">
                <div class="card-name">Mike, 28</div>
                <div class="card-info">📍 LA • 💻 Developer</div>
                <div class="card-info">Coffee enthusiast & hiker</div>
            </div>
        </div>
        <div class="card">
            <div class="card-img">👩</div>
            <div class="card-body">
                <div class="card-name">Emma, 24</div>
                <div class="card-info">📍 Chicago • 📸 Photographer</div>
                <div class="card-info">Adventure seeker 🌟</div>
            </div>
        </div>
    </div>
    <div class="card-actions">
        <button class="action-btn dislike">✖</button>
        <button class="action-btn super">⭐</button>
        <button class="action-btn like">♥</button>
    </div>
</body>
</html>
