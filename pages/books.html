<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Luo Books</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui; background: #0f172a; color: #f8fafc; }
        .header { background: linear-gradient(135deg, #7c3aed, #a855f7); padding: 20px 30px; }
        .logo { font-size: 24px; font-weight: 700; }
        .search { max-width: 600px; margin: 30px auto; display: flex; }
        .search input { flex: 1; background: white; border: none; padding: 15px 25px; border-radius: 30px 0 0 30px; outline: none; }
        .search button { background: #7c3aed; border: none; color: white; padding: 15px 25px; border-radius: 0 30px 30px 0; cursor: pointer; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 25px; padding: 30px; }
        .book { background: #1e293b; border-radius: 15px; overflow: hidden; cursor: pointer; transition: all 0.3s; }
        .book:hover { transform: translateY(-5px); }
        .book-cover { height: 250px; background: linear-gradient(135deg, #334155, #475569); display: flex; align-items: center; justify-content: center; font-size: 50px; }
        .book-body { padding: 20px; }
        .book-title { font-weight: 600; margin-bottom: 5px; }
        .book-author { color: #94a3b8; font-size: 14px; }
        .book-rating { color: #f59e0b; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">📚 Luo Books</div>
    </div>
    <div class="search"><input type="text" placeholder="Search books, authors, genres..."><button>🔍</button></div>
    <div class="grid">
        <div class="book"><div class="book-cover">📖</div><div class="book-body"><div class="book-title">The Luoverse</div><div class="book-author">Wayne AI</div><div class="book-rating">⭐ 4.9</div></div></div>
        <div class="book"><div class="book-cover">📕</div><div class="book-body"><div class="book-title">AI Revolution</div><div class="book-author">Sam Altman</div><div class="book-rating">⭐ 4.8</div></div></div>
        <div class="book"><div class="book-cover">📗</div><div class="book-body"><div class="book-title">Code Complete</div><div class="book-author">Steve McConnell</div><div class="book-rating">⭐ 4.7</div></div></div>
        <div class="book"><div class="book-cover">📘</div><div class="book-body"><div class="book-title">Clean Code</div><div class="book-author">Robert Martin</div><div class="book-rating">⭐ 4.9</div></div></div>
    </div>
</body>
</html>
