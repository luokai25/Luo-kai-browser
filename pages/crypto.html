<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Luo Crypto</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui; background: #0f172a; color: #f8fafc; }
        .header { background: linear-gradient(135deg, #f7931a, #627eea); padding: 20px 30px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 24px; font-weight: 700; }
        .balance-card { background: linear-gradient(135deg, #f7931a33, #627eea33); margin: 30px; border-radius: 20px; padding: 30px; }
        .balance-label { font-size: 14px; opacity: 0.8; }
        .balance { font-size: 48px; font-weight: 700; margin: 10px 0; }
        .balance-change { color: #22c55e; }
        .market { padding: 0 30px 30px; }
        .market h2 { font-size: 24px; margin-bottom: 20px; }
        .coin { background: #1e293b; border-radius: 15px; padding: 20px; margin-bottom: 15px; display: flex; align-items: center; gap: 20px; cursor: pointer; transition: all 0.2s; }
        .coin:hover { background: #334155; }
        .coin-icon { width: 50px; height: 50px; background: #334155; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .coin-info { flex: 1; }
        .coin-name { font-weight: 600; }
        .coin-symbol { color: #94a3b8; font-size: 14px; }
        .coin-price { text-align: right; }
        .coin-value { font-size: 18px; font-weight: 600; }
        .coin-change { color: #22c55e; font-size: 14px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">🪙 Luo Crypto</div>
        <span>🔔 🔐</span>
    </div>
    <div class="balance-card">
        <div class="balance-label">Total Balance</div>
        <div class="balance">$12,847.32</div>
        <div class="balance-change">↑ $1,234 (+10.6%) today</div>
    </div>
    <div class="market">
        <h2>Market</h2>
        <div class="coin"><div class="coin-icon">₿</div><div class="coin-info"><div class="coin-name">Bitcoin</div><div class="coin-symbol">BTC</div></div><div class="coin-price"><div class="coin-value">$67,432</div><div class="coin-change">+2.3%</div></div></div>
        <div class="coin"><div class="coin-icon" style="background:#627eea">Ξ</div><div class="coin-info"><div class="coin-name">Ethereum</div><div class="coin-symbol">ETH</div></div><div class="coin-price"><div class="coin-value">$3,542</div><div class="coin-change">+1.8%</div></div></div>
        <div class="coin"><div class="coin-icon" style="background:#26a17b">$</div><div class="coin-info"><div class="coin-name">Tether</div><div class="coin-symbol">USDT</div></div><div class="coin-price"><div class="coin-value">$1.00</div><div class="coin-change">+0.01%</div></div></div>
        <div class="coin"><div class="coin-icon" style="background:#f59e0b">S</div><div class="coin-info"><div class="coin-name">Solana</div><div class="coin-symbol">SOL</div></div><div class="coin-price"><div class="coin-value">$178.32</div><div class="coin-change">+5.2%</div></div></div>
    </div>
</body>
</html>
