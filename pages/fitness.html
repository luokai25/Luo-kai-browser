<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Luo Fitness</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui; background: #0f172a; color: #f8fafc; }
        .header { background: linear-gradient(135deg, #dc2626, #f97316); padding: 20px 30px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 24px; font-weight: 700; }
        .hero { background: linear-gradient(135deg, #dc262633, #f9731633); margin: 30px; border-radius: 20px; padding: 40px; text-align: center; }
        .hero h1 { font-size: 36px; margin-bottom: 10px; }
        .stats { display: flex; justify-content: center; gap: 40px; margin: 30px 0; }
        .stat { text-align: center; }
        .stat-value { font-size: 36px; font-weight: 700; color: #f97316; }
        .stat-label { color: #94a3b8; }
        .workouts { padding: 0 30px 30px; }
        .workouts h2 { margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .workout { background: #1e293b; border-radius: 15px; padding: 25px; cursor: pointer; transition: all 0.3s; }
        .workout:hover { transform: translateY(-5px); }
        .workout-icon { font-size: 40px; margin-bottom: 15px; }
        .workout-title { font-weight: 600; margin-bottom: 5px; }
        .workout-meta { color: #94a3b8; font-size: 14px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">💪 Luo Fitness</div>
        <span>👤</span>
    </div>
    <div class="hero">
        <h1>Your Daily Workout</h1>
        <div class="stats">
            <div class="stat"><div class="stat-value">450</div><div class="stat-label">Calories</div></div>
            <div class="stat"><div class="stat-value">45min</div><div class="stat-label">Duration</div></div>
            <div class="stat"><div class="stat-value">156</div><div class="stat-label">Avg BPM</div></div>
        </div>
        <button style="background: linear-gradient(135deg, #dc2626, #f97316); border: none; color: white; padding: 15px 40px; border-radius: 30px; font-size: 16px; font-weight: 600; cursor: pointer;">Start Workout</button>
    </div>
    <div class="workouts">
        <h2>Recommended Workouts</h2>
        <div class="grid">
            <div class="workout"><div class="workout-icon">🏃</div><div class="workout-title">Morning Run</div><div class="workout-meta">30 min • 300 cal</div></div>
            <div class="workout"><div class="workout-icon">🧘</div><div class="workout-title">Yoga Flow</div><div class="workout-meta">45 min • 180 cal</div></div>
            <div class="workout"><div class="workout-icon">🏋️</div><div class="workout-title">Strength Training</div><div class="workout-meta">60 min • 450 cal</div></div>
            <div class="workout"><div class="workout-icon">🚴</div><div class="workout-title">Cycling</div><div class="workout-meta">45 min • 400 cal</div></div>
        </div>
    </div>
</body>
</html>
