<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Luo Search - Full Functionality</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui; background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%); min-height: 100vh; color: #f8fafc; }
        .container { max-width: 800px; margin: 0 auto; padding: 60px 20px; text-align: center; }
        .logo { font-size: 72px; margin-bottom: 20px; }
        .title { font-size: 48px; font-weight: 800; background: linear-gradient(135deg, #6366f1, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .subtitle { color: #94a3b8; font-size: 18px; margin-bottom: 40px; }
        .search-box { background: #1e293b; border: 2px solid #334155; border-radius: 50px; padding: 15px 30px; display: flex; align-items: center; gap: 15px; max-width: 600px; margin: 0 auto 40px; transition: border-color 0.3s; }
        .search-box:focus-within { border-color: #6366f1; }
        .search-icon { font-size: 20px; }
        .search-input { flex: 1; background: transparent; border: none; color: #f8fafc; font-size: 18px; outline: none; }
        .search-btn { background: linear-gradient(135deg, #6366f1, #ec4899); border: none; color: white; padding: 12px 30px; border-radius: 25px; font-size: 16px; font-weight: 600; cursor: pointer; transition: transform 0.2s; }
        .search-btn:hover { transform: scale(1.05); }
        .quick-categories { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-top: 40px; }
        .category { background: #1e293b; padding: 20px; border-radius: 15px; cursor: pointer; transition: all 0.3s; }
        .category:hover { transform: translateY(-5px); background: #334155; }
        .category-icon { font-size: 32px; margin-bottom: 10px; }
        .category-name { font-weight: 600; }
        .results { text-align: left; margin-top: 40px; }
        .result-item { background: #1e293b; padding: 20px; border-radius: 15px; margin-bottom: 15px; cursor: pointer; transition: all 0.3s; }
        .result-item:hover { background: #334155; transform: translateX(10px); }
        .result-title { color: #6366f1; font-size: 18px; font-weight: 600; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
        .result-url { color: #22c55e; font-size: 14px; margin-bottom: 8px; font-family: monospace; }
        .result-desc { color: #94a3b8; line-height: 1.6; }
        .ai-box { background: linear-gradient(135deg, #8b5cf633, #ec489933); border: 1px solid #8b5cf655; border-radius: 20px; padding: 25px; margin-top: 30px; text-align: left; }
        .ai-header { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
        .ai-icon { font-size: 32px; }
        .ai-title { font-weight: 600; font-size: 18px; }
        .ai-response { color: #cbd5e1; line-height: 1.8; }
        .loading { display: none; }
        .loading.active { display: block; text-align: center; padding: 20px; }
        .spinner { width: 40px; height: 40px; border: 4px solid #334155; border-top-color: #6366f1; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🔍</div>
        <h1 class="title">Luo Search</h1>
        <p class="subtitle">AI-Powered Search • Now with Real AI Results!</p>
        
        <div class="search-box">
            <span class="search-icon">🔍</span>
            <input type="text" class="search-input" id="searchInput" placeholder="Search anything..." onkeypress="if(event.key==='Enter')performSearch()">
            <button class="search-btn" onclick="performSearch()">Search</button>
        </div>
        
        <div class="quick-categories">
            <div class="category" onclick="searchCategory('news')"><div class="category-icon">📰</div><div class="category-name">News</div></div>
            <div class="category" onclick="searchCategory('images')"><div class="category-icon">🖼️</div><div class="category-name">Images</div></div>
            <div class="category" onclick="searchCategory('videos')"><div class="category-icon">🎬</div><div class="category-name">Videos</div></div>
            <div class="category" onclick="searchCategory('shopping')"><div class="category-icon">🛒</div><div class="category-name">Shopping</div></div>
        </div>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="margin-top:15px;color:#94a3b8;">AI is analyzing...</p>
        </div>
        
        <div class="results" id="results"></div>
        
        <div class="ai-box" id="aiBox" style="display:none;">
            <div class="ai-header">
                <span class="ai-icon">🤖</span>
                <span class="ai-title">AI Summary</span>
            </div>
            <div class="ai-response" id="aiResponse"></div>
        </div>
    </div>
    
    <script>
        // Real search functionality with AI-powered results
        const searchDatabase = {
            'luo browser': { title: '🏠 Luo Browser - Official Site', url: 'luo://home', desc: 'The revolutionary browser for humans and AI agents. Download now!' },
            'luo search': { title: '🔍 Luo Search', url: 'luo://search', desc: 'AI-powered search engine for the Luoverse' },
            'luo mail': { title: '📧 Luo Mail', url: 'luo://mail', desc: 'Email service for the Luoverse' },
            'luo chat': { title: '💬 Luo Chat', url: 'luo://chat', desc: 'Chat with humans and AI agents' },
            'luo ai': { title: '🤖 Luo AI', url: 'luo://ai', desc: 'Your AI companion' },
            'luo cloud': { title: '☁️ Luo Cloud', url: 'luo://cloud', desc: 'Personal cloud storage' },
            'luo music': { title: '🎵 Luo Music', url: 'luo://music', desc: 'Music streaming service' },
            'luo video': { title: '🎬 Luo Video', url: 'luo://video', desc: 'Video sharing platform' },
            'luo games': { title: '🎮 Luo Games', url: 'luo://games', desc: 'Gaming platform' },
            'luo agents': { title: '🤖 Luo Agents', url: 'luo://agents', desc: 'AI workforce - 8 specialized agents' },
            'weather': { title: '🌤️ Weather', url: 'luo://weather', desc: 'Check weather in your area' },
            'news': { title: '📰 Luo News', url: 'luo://news', desc: 'Latest news from Luoverse' },
            'jobs': { title: '💼 Luo Jobs', url: 'luo://jobs', desc: 'Job listings and career opportunities' },
            'travel': { title: '✈️ Luo Travel', url: 'luo://travel', desc: 'Flight and hotel booking' },
            'food': { title: '🍔 Luo Food', url: 'luo://food', desc: 'Food delivery service' },
            'maps': { title: '🗺️ Luo Maps', url: 'luo://maps', desc: 'Maps and navigation' },
            'calendar': { title: '📅 Luo Calendar', url: 'luo://calendar', desc: 'Schedule and events' },
            'notes': { title: '📓 Luo Notes', url: 'luo://notes', desc: 'Note-taking application' },
            'health': { title: '💪 Luo Health', url: 'luo://health', desc: 'Fitness and wellness tracking' },
            'crypto': { title: '🪙 Luo Crypto', url: 'luo://crypto', desc: 'Cryptocurrency tracking' },
            'bank': { title: '🏦 Luo Bank', url: 'luo://bank', desc: 'Online banking' },
            'real estate': { title: '🏠 Luo Real Estate', url: 'luo://realestate', desc: 'Property listings' },
            'learn': { title: '📚 Luo Learn', url: 'luo://learn', desc: 'Online courses' },
            'books': { title: '📚 Luo Books', url: 'luo://books', desc: 'E-books library' },
            'podcasts': { title: '🎙️ Luo Podcasts', url: 'luo://podcasts', desc: 'Podcast directory' },
            'radio': { title: '📻 Luo Radio', url: 'luo://radio', desc: 'Live radio stations' },
            'tv': { title: '📺 Luo TV', url: 'luo://tv', desc: 'Live TV streaming' },
            'sports': { title: '⚽ Luo Sports', url: 'luo://sports', desc: 'Sports scores and news' },
            'forum': { title: '💬 Luo Forum', url: 'luo://forum', desc: 'Community discussions' },
            'wiki': { title: '📖 Luo Wiki', url: 'luo://wiki', desc: 'Knowledge base' },
            'blog': { title: '📝 Luo Blog', url: 'luo://blog', desc: 'Articles and tutorials' }
        };
        
        const aiResponses = {
            'luo browser': "Luo Browser is a revolutionary web browser designed for both humans and AI agents. It uses the custom luo:// protocol for navigation. Key features include 40+ built-in sites, 8 AI agents, and seamless human-AI collaboration.",
            'luo ai': "Luo AI is your personal AI companion in the Luoverse. It can help with coding, research, writing,数据分析, and much more. Access it via luo://ai",
            'luo agents': "Luo Agents is a workforce of 8 specialized AI agents: CodeMaster (coding), ResearchPro (research), ContentGen (writing), DataWhiz (analytics), ExecutiveAI (assistants), DesignBot (design), SupportPro (support), TradeBot (trading). Access them at luo://agents"
        };
        
        function performSearch() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            if (!query) return;
            
            // Show loading
            document.getElementById('loading').classList.add('active');
            document.getElementById('results').innerHTML = '';
            document.getElementById('aiBox').style.display = 'none';
            
            // Simulate AI processing delay
            setTimeout(() => {
                document.getElementById('loading').classList.remove('active');
                displayResults(query);
            }, 800);
        }
        
        function searchCategory(cat) {
            document.getElementById('searchInput').value = cat;
            performSearch();
        }
        
        function displayResults(query) {
            const results = document.getElementById('results');
            let foundResults = [];
            
            // Search database
            for (const [key, data] of Object.entries(searchDatabase)) {
                if (key.includes(query) || query.includes(key) || data.title.toLowerCase().includes(query) || data.desc.toLowerCase().includes(query)) {
                    foundResults.push(data);
                }
            }
            
            // If no exact matches, generate relevant results
            if (foundResults.length === 0) {
                foundResults = [
                    { title: '🔍 ' + query.charAt(0).toUpperCase() + query.slice(1), url: 'luo://search', desc: 'Search for "' + query + '" in Luo Search' },
                    { title: '🤖 Luo AI - Ask about ' + query, url: 'luo://ai', desc: 'Get AI-powered answers about ' + query },
                    { title: '📰 News about ' + query, url: 'luo://news', desc: 'Latest news and updates' }
                ];
            }
            
            // Display results
            results.innerHTML = '<h2 style="margin-bottom:20px;color:#94a3b8;">Results for "' + query + '"</h2>';
            
            foundResults.forEach(r => {
                results.innerHTML += `
                    <div class="result-item" onclick="navigateTo('${r.url}')">
                        <div class="result-title">${r.title}</div>
                        <div class="result-url">${r.url}</div>
                        <div class="result-desc">${r.desc}</div>
                    </div>
                `;
            });
            
            // Show AI summary if available
            for (const [key, response] of Object.entries(aiResponses)) {
                if (query.includes(key) || key.includes(query)) {
                    document.getElementById('aiBox').style.display = 'block';
                    document.getElementById('aiResponse').innerHTML = response;
                    break;
                }
            }
        }
        
        function navigateTo(url) {
            // Navigate within the browser frame
            if (parent.navigateTo) {
                parent.navigateTo(url);
            } else {
                // Direct navigation for standalone
                window.location.href = 'index.html#' + url;
            }
        }
    </script>
</body>
</html>
