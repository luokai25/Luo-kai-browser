<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History - Luo Browser</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background: #000000; color: #ffffff; min-height: 100vh; padding: 20px;
        }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .title { font-size: 28px; font-weight: 700; background: linear-gradient(135deg, #6366f1, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .clear-btn { background: #ef4444; border: none; color: white; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .clear-btn:hover { background: #dc2626; }
        
        .list { display: flex; flex-direction: column; gap: 8px; }
        .history-item { 
            background: #111111; border: 1px solid #222222; border-radius: 8px; 
            padding: 12px 16px; display: flex; align-items: center; gap: 12px; 
            cursor: pointer; transition: all 0.2s;
        }
        .history-item:hover { border-color: #6366f1; background: #1a1a1a; }
        .history-icon { font-size: 20px; }
        .history-info { flex: 1; }
        .history-title { font-size: 14px; font-weight: 500; color: #cccccc; }
        .history-url { font-size: 11px; color: #444444; font-family: monospace; }
        .history-time { font-size: 10px; color: #333333; }
        
        .empty { text-align: center; padding: 60px; color: #444444; }
        
        .date-group { margin-bottom: 20px; }
        .date-label { font-size: 12px; color: #666666; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div class="header">
        <h1 class="title">📜 History</h1>
        <button class="clear-btn" onclick="clearHistory()">Clear All</button>
    </div>
    
    <div class="list" id="historyList"></div>
    <div class="empty" id="emptyState">No history yet!</div>
    
    <script>
        const DB = {
            init() {
                ['history', 'bookmarks', 'notes', 'cache', 'settings'].forEach(db => {
                    if (!localStorage.getItem('luo_' + db)) {
                        localStorage.setItem('luo_' + db, JSON.stringify([]));
                    }
                });
            },
            get(db) { return JSON.parse(localStorage.getItem('luo_' + db) || '[]'); },
            set(db, data) { localStorage.setItem('luo_' + db, JSON.stringify(data)); }
        };
        
        function loadHistory() {
            const history = DB.get('history');
            const list = document.getElementById('historyList');
            const empty = document.getElementById('emptyState');
            
            if (history.length === 0) {
                list.style.display = 'none';
                empty.style.display = 'block';
                return;
            }
            
            // Group by date
            const grouped = {};
            history.forEach(h => {
                const date = new Date(h.visited).toLocaleDateString();
                if (!grouped[date]) grouped[date] = [];
                grouped[date].push(h);
            });
            
            list.style.display = 'flex';
            empty.style.display = 'none';
            
            let html = '';
            for (const [date, items] of Object.entries(grouped)) {
                html += `<div class="date-group"><div class="date-label">${date}</div>`;
                html += items.map(h => `
                    <div class="history-item" onclick="openUrl('${h.url}')">
                        <span class="history-icon">🌐</span>
                        <div class="history-info">
                            <div class="history-title">${h.title}</div>
                            <div class="history-url">${h.url}</div>
                        </div>
                        <div class="history-time">${new Date(h.visited).toLocaleTimeString()}</div>
                    </div>
                `).join('');
                html += '</div>';
            }
            list.innerHTML = html;
        }
        
        function openUrl(url) {
            window.parent.navigateTo(url);
        }
        
        function clearHistory() {
            if (confirm('Clear all history?')) {
                DB.set('history', []);
                loadHistory();
            }
        }
        
        DB.init();
        loadHistory();
    </script>
</body>
</html>
