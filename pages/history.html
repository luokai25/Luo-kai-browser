<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Luo History</title>
    <style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Segoe UI',system-ui;background:#0f172a;color:#f8fafc;min-height:100vh}.header{background:linear-gradient(135deg,#6366f1,#ec4899);padding:20px 30px;display:flex;justify-content:space-between;align-items:center}.logo{font-size:24px;font-weight:700}.search{background:#1e293b;border:none;padding:10px 20px;border-radius:25px;color:#f8fafc;width:300px;outline:none}.container{max-width:800px;margin:0 auto;padding:30px}.date-group{margin-bottom:25px}.date-label{color:#94a3b8;font-size:14px;margin-bottom:15px}.item{background:#1e293b;border-radius:12px;padding:15px 20px;margin-bottom:10px;display:flex;align-items:center;gap:15px;cursor:pointer;transition:all 0.2s}.item:hover{background:#334155}.item-icon{font-size:20px}.item-info{flex:1}.item-title{font-weight:500;margin-bottom:3px}.item-url{color:#6366f1;font-size:13px;font-family:monospace}.item-time{color:#94a3b8;font-size:13px}.clear-btn{background:#ef4444;border:none;color:white;padding:10px 20px;border-radius:20px;cursor:pointer}</style>
</head>
<body>
<div class="header"><div class="logo">📜 Luo History</div><input type="text" class="search" placeholder="Search history..."></div>
<div class="container">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:30px"><h2>Recent</h2><button class="clear-btn">Clear All</button></div>
<div class="date-group"><div class="date-label">Today</div>
<div class="item"><span class="item-icon">🔍</span><div class="item-info"><div class="item-title">Luo Search</div><div class="item-url">luo://search</div></div><div class="item-time">2:30 PM</div></div>
<div class="item"><span class="item-icon">📧</span><div class="item-info"><div class="item-title">Luo Mail</div><div class="item-url">luo://mail</div></div><div class="item-time">1:15 PM</div></div>
</div>
<div class="date-group"><div class="date-label">Yesterday</div>
<div class="item"><span class="item-icon">💬</span><div class="item-info"><div class="item-title">Luo Chat</div><div class="item-url">luo://chat</div></div><div class="item-time">5:45 PM</div></div>
<div class="item"><span class="item-icon">📚</span><div class="item-info"><div class="item-title">Luo Docs</div><div class="item-url">luo://docs</div></div><div class="item-time">3:20 PM</div></div>
</div>
<div class="date-group"><div class="date-label">This Week</div>
<div class="item"><span class="item-icon">🎬</span><div class="item-info"><div class="item-title">Luo Media</div><div class="item-url">luo://media</div></div><div class="item-time">Jan 30</div></div>
<div class="item"><span class="item-icon">📰</span><div class="item-info"><div class="item-title">Luo News</div><div class="item-url">luo://news</div></div><div class="item-time">Jan 29</div></div>
</div>
</div>
</body>
</html>
