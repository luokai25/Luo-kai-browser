<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Luo Wallet</title>
    <style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Segoe UI',system-ui;background:#0f172a;color:#f8fafc;min-height:100vh}.header{background:linear-gradient(135deg,#6366f1,#ec4899);padding:20px 30px;display:flex;justify-content:space-between;align-items:center}.logo{font-size:24px;font-weight:700}.container{max-width:600px;margin:0 auto;padding:30px}.balance-card{background:linear-gradient(135deg,#6366f1,#ec4899);border-radius:20px;padding:30px;text-align:center;margin-bottom:30px}.balance-label{font-size:14px;opacity:0.9}.balance{font-size:48px;font-weight:700;margin:10px 0}.address{background:rgba(255,255,255,0.2);padding:10px 15px;border-radius:10px;font-family:monospace;font-size:13px}.actions{display:flex;gap:15px;margin-bottom:30px}.action{flex:1;background:#1e293b;padding:20px;border-radius:15px;text-align:center;cursor:pointer;transition:all 0.3s}.action:hover{background:#334155}.action-icon{font-size:28px;margin-bottom:8px}.action-name{font-weight:600}.history-item{background:#1e293b;border-radius:15px;padding:20px;margin-bottom:15px;display:flex;align-items:center;gap:15px}.history-icon{width:45px;height:45px;border-radius:50%;background:#334155;display:flex;align-items:center;justify-content:center;font-size:20px}.history-info{flex:1}.history-title{font-weight:600;margin-bottom:3px}.history-date{color:#94a3b8;font-size:13px}.history-amount{font-size:18px;font-weight:600}.history-amount.positive{color:#22c55e}.history-amount.negative{color:#ef4444}</style>
</head>
<body>
<div class="header"><div class="logo">💰 Luo Wallet</div></div>
<div class="container">
<div class="balance-card"><div class="balance-label">Total Balance</div><div class="balance">1,250.00</div><div class="address">0x1234...abcd</div></div>
<div class="actions"><div class="action"><div class="action-icon">⬆️</div><div class="action-name">Send</div></div><div class="action"><div class="action-icon">⬇️</div><div class="action-name">Receive</div></div><div class="action"><div class="action-icon">🔄</div><div class="action-name">Swap</div></div></div>
<h3 style="margin-bottom:20px;">Recent Transactions</h3>
<div class="history-item"><div class="history-icon">📧</div><div class="history-info"><div class="history-title">Luo Mail Premium</div><div class="history-date">Today, 10:30 AM</div></div><div class="history-amount negative">-9.99</div></div>
<div class="history-item"><div class="history-icon">🛒</div><div class="history-info"><div class="history-title">Luo Store Purchase</div><div class="history-date">Yesterday</div></div><div class="history-amount negative">-4.99</div></div>
<div class="history-item"><div class="history-icon">💵</div><div class="history-info"><div class="history-title">Deposit</div><div class="history-date">Jan 30, 2024</div></div><div class="history-amount positive">+100.00</div></div>
</div>
</body>
</html>
