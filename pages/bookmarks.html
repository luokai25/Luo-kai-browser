<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookmarks - Luo Browser</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background: #000000; color: #ffffff; min-height: 100vh; padding: 20px;
        }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .title { font-size: 28px; font-weight: 700; background: linear-gradient(135deg, #6366f1, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .search-box { 
            background: #111111; border: 1px solid #222222; border-radius: 8px; 
            padding: 10px 16px; color: white; width: 300px; outline: none;
        }
        .search-box:focus { border-color: #6366f1; }
        
        .list { display: flex; flex-direction: column; gap: 8px; }
        .bookmark { 
            background: #111111; border: 1px solid #222222; border-radius: 8px; 
            padding: 12px 16px; display: flex; align-items: center; gap: 12px; 
            cursor: pointer; transition: all 0.2s;
        }
        .bookmark:hover { border-color: #6366f1; background: #1a1a1a; }
        .bookmark-icon { font-size: 20px; }
        .bookmark-info { flex: 1; }
        .bookmark-title { font-size: 14px; font-weight: 500; color: #cccccc; }
        .bookmark-url { font-size: 11px; color: #444444; font-family: monospace; }
        .bookmark-date { font-size: 10px; color: #333333; }
        .bookmark-delete { 
            background: transparent; border: none; color: #444; cursor: pointer; 
            font-size: 16px; padding: 4px 8px; border-radius: 4px;
        }
        .bookmark-delete:hover { background: #ef4444; color: white; }
        
        .empty { text-align: center; padding: 60px; color: #444444; }
    </style>
</head>
<body>
    <div class="header">
        <h1 class="title">⭐ Bookmarks</h1>
        <input type="text" class="search-box" id="searchBox" placeholder="Search bookmarks..." oninput="searchBookmarks()">
    </div>
    
    <div class="list" id="bookmarksList"></div>
    <div class="empty" id="emptyState">No bookmarks yet!</div>
    
    <script>
        const DB = {
            init() {
                ['bookmarks', 'history', 'notes', 'cache', 'settings'].forEach(db => {
                    if (!localStorage.getItem('luo_' + db)) {
                        localStorage.setItem('luo_' + db, JSON.stringify([]));
                    }
                });
            },
            get(db) { return JSON.parse(localStorage.getItem('luo_' + db) || '[]'); },
            set(db, data) { localStorage.setItem('luo_' + db, JSON.stringify(data)); },
            delete(db, id) { this.set(db, this.get(db).filter(i => i.id !== id)); }
        };
        
        let allBookmarks = [];
        
        function loadBookmarks() {
            allBookmarks = DB.get('bookmarks');
            renderBookmarks(allBookmarks);
        }
        
        function renderBookmarks(bookmarks) {
            const list = document.getElementById('bookmarksList');
            const empty = document.getElementById('emptyState');
            
            if (bookmarks.length === 0) {
                list.style.display = 'none';
                empty.style.display = 'block';
                return;
            }
            
            list.style.display = 'flex';
            empty.style.display = 'none';
            list.innerHTML = bookmarks.map(b => `
                <div class="bookmark" onclick="openBookmark('${b.url}')">
                    <span class="bookmark-icon">${b.favicon || '📌'}</span>
                    <div class="bookmark-info">
                        <div class="bookmark-title">${b.title}</div>
                        <div class="bookmark-url">${b.url}</div>
                    </div>
                    <div class="bookmark-date">${new Date(b.created).toLocaleDateString()}</div>
                    <button class="bookmark-delete" onclick="deleteBookmark(event, ${b.id})">🗑️</button>
                </div>
            `).join('');
        }
        
        function openBookmark(url) {
            // Navigate in parent browser
            window.parent.navigateTo(url);
        }
        
        function deleteBookmark(e, id) {
            e.stopPropagation();
            DB.delete('bookmarks', id);
            loadBookmarks();
        }
        
        function searchBookmarks() {
            const query = document.getElementById('searchBox').value.toLowerCase();
            const filtered = allBookmarks.filter(b => 
                b.title.toLowerCase().includes(query) || 
                b.url.toLowerCase().includes(query)
            );
            renderBookmarks(filtered);
        }
        
        DB.init();
        loadBookmarks();
    </script>
</body>
</html>
