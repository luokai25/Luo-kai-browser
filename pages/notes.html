<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes - Luo Browser</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background: #000000; color: #ffffff; min-height: 100vh; padding: 20px;
        }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .title { font-size: 28px; font-weight: 700; background: linear-gradient(135deg, #6366f1, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .add-btn { background: #6366f1; border: none; color: white; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .add-btn:hover { background: #818cf8; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 16px; }
        .note { 
            background: #111111; border: 1px solid #222222; border-radius: 12px; padding: 16px; 
            cursor: pointer; transition: all 0.2s; position: relative;
        }
        .note:hover { border-color: #6366f1; transform: translateY(-2px); }
        .note-title { font-size: 14px; font-weight: 600; margin-bottom: 8px; color: #cccccc; }
        .note-content { font-size: 12px; color: #666666; line-height: 1.5; max-height: 80px; overflow: hidden; }
        .note-date { font-size: 10px; color: #444444; margin-top: 12px; }
        .note-delete { 
            position: absolute; top: 8px; right: 8px; background: #ef4444; border: none; 
            color: white; width: 20px; height: 20px; border-radius: 50%; cursor: pointer; 
            font-size: 12px; opacity: 0; transition: opacity 0.2s;
        }
        .note:hover .note-delete { opacity: 1; }
        
        .modal { 
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; 
            background: rgba(0,0,0,0.8); align-items: center; justify-content: center; z-index: 1000;
        }
        .modal.open { display: flex; }
        .modal-content { 
            background: #111111; border: 1px solid #222222; border-radius: 12px; 
            padding: 24px; width: 90%; max-width: 500px;
        }
        .modal-title { font-size: 18px; font-weight: 600; margin-bottom: 16px; }
        .modal input, .modal textarea { 
            width: 100%; background: #1a1a1a; border: 1px solid #222222; 
            border-radius: 8px; padding: 12px; color: white; font-size: 14px; margin-bottom: 12px;
        }
        .modal textarea { height: 150px; resize: none; }
        .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
        .modal-save { background: #6366f1; border: none; color: white; padding: 10px 20px; border-radius: 8px; cursor: pointer; }
        .modal-cancel { background: #222222; border: none; color: #888; padding: 10px 20px; border-radius: 8px; cursor: pointer; }
        
        .empty { text-align: center; padding: 60px; color: #444444; }
        .empty-icon { font-size: 48px; margin-bottom: 16px; }
    </style>
</head>
<body>
    <div class="header">
        <h1 class="title">📓 Notes</h1>
        <button class="add-btn" onclick="openModal()">+ Add Note</button>
    </div>
    
    <div class="grid" id="notesGrid"></div>
    
    <div class="empty" id="emptyState">
        <div class="empty-icon">📝</div>
        <p>No notes yet. Create your first note!</p>
    </div>
    
    <!-- Modal -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-title" id="modalTitle">New Note</div>
            <input type="text" id="noteTitle" placeholder="Note title...">
            <textarea id="noteContent" placeholder="Write your note..."></textarea>
            <div class="modal-actions">
                <button class="modal-cancel" onclick="closeModal()">Cancel</button>
                <button class="modal-save" onclick="saveNote()">Save</button>
            </div>
        </div>
    </div>
    
    <script>
        // Multi-Database Notes System
        const DB = {
            init() {
                ['notes', 'bookmarks', 'history', 'cache', 'settings'].forEach(db => {
                    if (!localStorage.getItem('luo_' + db)) {
                        localStorage.setItem('luo_' + db, JSON.stringify([]));
                    }
                });
            },
            get(db) { return JSON.parse(localStorage.getItem('luo_' + db) || '[]'); },
            set(db, data) { localStorage.setItem('luo_' + db, JSON.stringify(data)); },
            add(db, item) {
                const data = this.get(db);
                const newItem = { ...item, id: Date.now(), created: new Date().toISOString() };
                data.unshift(newItem);
                this.set(db, data);
                return newItem;
            },
            delete(db, id) {
                const data = this.get(db).filter(i => i.id !== id);
                this.set(db, data);
            }
        };
        
        let editingId = null;
        
        function loadNotes() {
            const notes = DB.get('notes');
            const grid = document.getElementById('notesGrid');
            const empty = document.getElementById('emptyState');
            
            if (notes.length === 0) {
                grid.style.display = 'none';
                empty.style.display = 'block';
                return;
            }
            
            grid.style.display = 'grid';
            empty.style.display = 'none';
            grid.innerHTML = notes.map(note => `
                <div class="note" onclick="editNote(${note.id})">
                    <button class="note-delete" onclick="deleteNote(event, ${note.id})">×</button>
                    <div class="note-title">${note.title || 'Untitled'}</div>
                    <div class="note-content">${note.content || ''}</div>
                    <div class="note-date">${new Date(note.created).toLocaleDateString()}</div>
                </div>
            `).join('');
        }
        
        function openModal() {
            editingId = null;
            document.getElementById('modalTitle').textContent = 'New Note';
            document.getElementById('noteTitle').value = '';
            document.getElementById('noteContent').value = '';
            document.getElementById('modal').classList.add('open');
        }
        
        function closeModal() {
            document.getElementById('modal').classList.remove('open');
        }
        
        function editNote(id) {
            const notes = DB.get('notes');
            const note = notes.find(n => n.id === id);
            if (!note) return;
            editingId = id;
            document.getElementById('modalTitle').textContent = 'Edit Note';
            document.getElementById('noteTitle').value = note.title || '';
            document.getElementById('noteContent').value = note.content || '';
            document.getElementById('modal').classList.add('open');
        }
        
        function saveNote() {
            const title = document.getElementById('noteTitle').value.trim();
            const content = document.getElementById('noteContent').value.trim();
            
            if (!title && !content) {
                closeModal();
                return;
            }
            
            if (editingId) {
                const notes = DB.get('notes');
                const index = notes.findIndex(n => n.id === editingId);
                if (index !== -1) {
                    notes[index] = { ...notes[index], title, content, updated: new Date().toISOString() };
                    DB.set('notes', notes);
                }
            } else {
                DB.add('notes', { title, content });
            }
            
            closeModal();
            loadNotes();
        }
        
        function deleteNote(e, id) {
            e.stopPropagation();
            if (confirm('Delete this note?')) {
                DB.delete('notes', id);
                loadNotes();
            }
        }
        
        // Init
        DB.init();
        loadNotes();
    </script>
</body>
</html>
