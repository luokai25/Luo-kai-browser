<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Luo Radio</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui; background: linear-gradient(180deg, #1e1b4b, #0f172a); color: #f8fafc; min-height: 100vh; }
        .player { position: fixed; bottom: 0; left: 0; right: 0; background: linear-gradient(135deg, #7c3aed, #ec4899); padding: 20px 30px; display: flex; align-items: center; gap: 20px; }
        .player-icon { width: 60px; height: 60px; background: white; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 30px; }
        .player-info { flex: 1; }
        .player-title { font-weight: 600; margin-bottom: 3px; }
        .player-station { color: rgba(255,255,255,0.8); font-size: 14px; }
        .player-controls { display: flex; gap: 20px; font-size: 24px; }
        .stations { padding: 30px; }
        .stations h2 { margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .station { background: #1e293b; border-radius: 15px; padding: 25px; cursor: pointer; transition: all 0.3s; }
        .station:hover { transform: translateY(-5px); }
        .station-icon { font-size: 40px; margin-bottom: 15px; }
        .station-name { font-weight: 600; margin-bottom: 5px; }
        .station-genre { color: #94a3b8; font-size: 14px; }
        .station-live { background: #ef4444; padding: 3px 10px; border-radius: 10px; font-size: 12px; margin-left: 10px; }
    </style>
</head>
<body>
    <div class="stations">
        <h2>📻 Live Stations</h2>
        <div class="grid">
            <div class="station"><div class="station-icon">🎵</div><div class="station-name">Luo Hits<span class="station-live">LIVE</span></div><div class="station-genre">Pop • Top 40</div></div>
            <div class="station"><div class="station-icon">🎸</div><div class="station-name">Rock Radio</div><div class="station-genre">Rock • Classic</div></div>
            <div class="station"><div class="station-icon">🎹</div><div class="station-name">Chill Vibes</div><div class="station-genre">Lo-Fi • Ambient</div></div>
            <div class="station"><div class="station-icon">🔥</div><div class="station-name">Hip Hop Nation</div><div class="station-genre">Hip Hop • Rap</div></div>
            <div class="station"><div class="station-icon">💃</div><div class="station-name">Latin Beats</div><div class="station-genre">Latin • Reggaeton</div></div>
            <div class="station"><div class="station-icon">🎻</div><div class="station-name">Classical FM</div><div class="station-genre">Classical • Orchestra</div></div>
        </div>
    </div>
    <div class="player">
        <div class="player-icon">🎵</div>
        <div class="player-info"><div class="player-title">Luo Hits</div><div class="player-station">Now Playing: Shape of You</div></div>
        <div class="player-controls">⏮️ ▶ ⏭️ 🔊</div>
    </div>
</body>
</html>
